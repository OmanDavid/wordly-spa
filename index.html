<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordly — Dictionary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-w">W</span><span class="logo-rest">ordly</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="theme-icon">◐</span>
      </button>
    </div>
    <p class="tagline">Every word has a story.</p>
  </header>

  <!-- SEARCH -->
  <main class="main-content">
    <section class="search-section" aria-label="Word search">
      <form id="searchForm" class="search-form" novalidate>
        <div class="input-wrapper">
          <input
            type="text"
            id="wordInput"
            class="search-input"
            placeholder="Search a word..."
            aria-label="Enter a word to search"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" class="search-btn" aria-label="Search">
            <span class="btn-text">Define</span>
            <span class="btn-arrow">→</span>
          </button>
        </div>
        <p class="input-error" id="inputError" role="alert" aria-live="assertive"></p>
      </form>
    </section>

    <!-- LOADING STATE -->
    <div class="loading-state" id="loadingState" hidden aria-live="polite">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
      <p>Looking up the word...</p>
    </div>

    <!-- ERROR STATE -->
    <div class="error-state" id="errorState" hidden role="alert" aria-live="assertive">
      <span class="error-icon">✕</span>
      <p id="errorMessage">Word not found.</p>
    </div>

    <!-- RESULTS -->
    <section class="results-section" id="resultsSection" hidden aria-label="Word results">

      <!-- Word Header -->
      <div class="word-header">
        <div class="word-title-block">
          <h1 class="word-title" id="wordTitle"></h1>
          <span class="word-phonetic" id="wordPhonetic"></span>
        </div>
        <div class="word-actions">
          <button class="audio-btn" id="audioBtn" hidden aria-label="Play pronunciation">
            <span class="audio-icon">▶</span>
            <span>Listen</span>
          </button>
          <button class="save-btn" id="saveBtn" aria-label="Save word">
            <span class="save-icon">♡</span>
            <span>Save</span>
          </button>
        </div>
      </div>

      <!-- Meanings -->
      <div class="meanings-container" id="meaningsContainer"></div>

      <!-- Synonyms -->
      <div class="synonyms-section" id="synonymsSection" hidden>
        <h3 class="section-label">Synonyms</h3>
        <div class="synonyms-list" id="synonymsList"></div>
      </div>

      <!-- Source -->
      <div class="source-section" id="sourceSection" hidden>
        <h3 class="section-label">Source</h3>
        <a class="source-link" id="sourceLink" target="_blank" rel="noopener noreferrer"></a>
      </div>

    </section>

    <!-- SAVED WORDS -->
    <section class="saved-section" id="savedSection" hidden aria-label="Saved words">
      <div class="saved-header">
        <h2 class="section-label">Saved Words</h2>
        <button class="clear-btn" id="clearSavedBtn" aria-label="Clear all saved words">Clear all</button>
      </div>
      <div class="saved-list" id="savedList"></div>
    </section>

  </main>

  <footer class="site-footer">
    <p>Powered by <a href="https://dictionaryapi.dev" target="_blank" rel="noopener noreferrer">Free Dictionary API</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
